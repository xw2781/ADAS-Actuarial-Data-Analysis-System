<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gf1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>

  <rect x="32" y="32" width="448" height="448" rx="80" fill="#f5f5f5"/>

  <!-- 三条弧线 从同一点发散，粗细渐变 -->
  <path d="M 100 400 Q 100 100 400 100"
        fill="none" stroke="url(#gf1)" stroke-width="48" stroke-linecap="round"/>
  <path d="M 100 400 Q 150 180 420 180"
        fill="none" stroke="url(#gf1)" stroke-width="28" stroke-linecap="round" opacity="0.5"/>
  <path d="M 100 400 Q 200 260 430 260"
        fill="none" stroke="url(#gf1)" stroke-width="14" stroke-linecap="round" opacity="0.25"/>
</svg>
